version    = "1.18.1"
dependencies = ["autoconf@>=2.65"]
build_dependencies = []

[script_args]
unpack_directory = "automake-1.18.1"

# Linux aarch64 (ARM64)
[targets.aarch64-unknown-linux-gnu]
url       = "https://ftpmirror.gnu.org/gnu/automake/automake-1.18.1.tar.gz"

# macOS Intel
[targets.x86_64-apple-darwin]
url       = "https://ftpmirror.gnu.org/gnu/automake/automake-1.18.1.tar.gz"

# macOS ARM (Apple Silicon)
[targets.aarch64-apple-darwin]
url       = "https://ftpmirror.gnu.org/gnu/automake/automake-1.18.1.tar.gz"
